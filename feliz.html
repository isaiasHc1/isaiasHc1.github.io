<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz 1 año 5 meses ❤️</title>

<!-- FUENTES PRO -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(-45deg, #ff758c, #ff7eb3, #fad0c4, #ffdde1);
    background-size: 400% 400%;
    animation: fondo 12s ease infinite;
}

/* FONDO ANIMADO */
@keyframes fondo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* CONTENEDOR */
.container {
    text-align: center;
    color: white;
    z-index: 2;
    animation: fadeIn 2s ease;
}

/* TÍTULO 3D PRO */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 65px;

    text-shadow:
        0 3px 0 #ff4d6d,
        0 6px 0 #ff4d6d,
        0 10px 20px rgba(0,0,0,0.4);

    animation: glow 2s infinite alternate;
}

h2 {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px;
    margin: 10px 0;
    letter-spacing: 1px;

    color: #fff;

    /* EFECTO BRILLO */
    text-shadow:
        0 0 5px rgba(255,255,255,0.8),
        0 0 10px rgba(255,105,180,0.8),
        0 0 20px rgba(255,105,180,0.6);

    /* ANIMACIÓN SUAVE */
    animation: pulse 3s infinite ease-in-out;
}

/* EFECTO RESPIRACIÓN */
@keyframes pulse {
    0% {
        transform: scale(1);
        opacity: 0.9;
    }
    50% {
        transform: scale(1.05);
        opacity: 1;
    }
    100% {
        transform: scale(1);
        opacity: 0.9;
    }
}

/* TEXTO BONITO ABAJO */
p {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    margin: 12px 0;
    letter-spacing: 1px;

    position: relative;
    display: inline-block;
    overflow: hidden;
}

/* EFECTO BRILLO QUE PASA */
p::after {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
    animation: shine 3s infinite;
}

/* BRILLO ANIMADO */
@keyframes shine {
    0% { left: -100%; }
    100% { left: 100%; }
}

/* GLOW TÍTULO */
@keyframes glow {
    from {
        text-shadow:
            0 0 10px #fff,
            0 0 20px #ff4d6d,
            0 0 40px #ff4d6d;
    }
    to {
        text-shadow:
            0 0 20px #fff,
            0 0 40px #ff7eb3,
            0 0 60px #ff7eb3;
    }
}

/* ANIMACIÓN ENTRADA */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* CORAZONES */
.heart {
    position: absolute;
    color: rgba(255, 0, 100, 0.8);
    animation: float 6s linear infinite;
}

/* BURBUJAS */
.bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    animation: rise 8s linear infinite;
}

/* BRILLOS */
.sparkle {
    position: absolute;
    color: white;
    font-size: 14px;
    animation: sparkle 3s linear infinite;
}

/* ANIMACIONES */
@keyframes float {
    from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

@keyframes rise {
    from {
        transform: translateY(100vh);
        opacity: 0.6;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

@keyframes sparkle {
    0% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.3); }
    100% { opacity: 0; transform: scale(0.5); }
}
</style>
</head>

<body>

<div class="container">
    <h1>Feliz 1 año y 5 meses ❤️</h1>
    <h2>Buenaa elección Amorrrr😍</h2>
    <h2>Gracias por estar conmigo 🥺💖</h2>
    <h2>Eres lo mejor que me ha pasado 😍</h2>
    <h2>Y quiero seguir contigo mucho más ❤️❤️</h2>
</div>

<script>
// CORAZONES
function crearCorazon() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerText = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 25 + 15 + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

// BRILLOS
function crearBrillo() {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerText = "✨";

    sparkle.style.left = Math.random() * 100 + "vw";
    sparkle.style.top = Math.random() * 100 + "vh";

    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 3000);
}

// BURBUJAS
function crearBurbuja() {
    const bubble = document.createElement("div");
    bubble.className = "bubble";

    let size = Math.random() * 20 + 10;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(bubble);
    setTimeout(() => bubble.remove(), 8000);
}

setInterval(crearCorazon, 250);
setInterval(crearBrillo, 400);
setInterval(crearBurbuja, 600);
</script>

</body>
</html>
